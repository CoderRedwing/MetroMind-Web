services:
  - type: web
    name: dmrc-metro-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false        # you set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # set to your Vercel URL e.g. https://metromind.vercel.app
    healthCheckPath: /health
